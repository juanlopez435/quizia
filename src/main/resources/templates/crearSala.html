<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Sala</title>

    <style>

        body{
            background:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
            margin-top:50px;
        }

        select{
            width:300px;
            padding:10px;
            margin:20px;
        }

        button{
            padding:15px;
            width:250px;
            background:#0984e3;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
        }

    </style>

</head>

<body>

<h1>Crear Sala</h1>

<select id="quiz">
</select>

<br>

<button onclick="crearSala()">
    Crear Sala
</button>

<br><br>

<h2 id="resultado"></h2>

<script>

    async function cargarQuizs(){

        const respuesta =
            await fetch("/quizs/listar");

        const quizs =
            await respuesta.json();

        let select =
            document.getElementById("quiz");

        select.innerHTML = "";

        quizs.forEach(quiz => {

            select.innerHTML += `
                <option value="${quiz.id}">
                    ${quiz.titulo}
                </option>
            `;
        });
    }

    async function crearSala(){

        const quizId =
            document.getElementById("quiz").value;

        const respuesta =
            await fetch("/salas/guardar",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    quiz:{
                        id:quizId
                    }
                })
            });

        const sala =
            await respuesta.json();

        document.getElementById("resultado")
            .innerHTML =
            "Código generado: <b>" +
            sala.codigo +
            "</b>";
    }

    cargarQuizs();

</script>

</body>

</html>
