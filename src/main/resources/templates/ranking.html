<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking QuizIA</title>

    <style>
        body{
            background:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        table{
            margin:auto;
            margin-top:30px;
            border-collapse:collapse;
            width:700px;
        }

        th,td{
            border:1px solid white;
            padding:10px;
        }

        th{
            background:#0984e3;
        }

        select{
            padding:10px;
            width:300px;
            margin-top:20px;
        }

        button{
            padding:10px;
            width:200px;
            margin-left:10px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h1>🏆 Ranking QuizIA</h1>

<select id="quiz"></select>

<button onclick="cargarRanking()">
    Ver Ranking
</button>

<table>

    <thead>
    <tr>
        <th>Posición</th>
        <th>Jugador</th>
        <th>Puntaje</th>
    </tr>
    </thead>

    <tbody id="tabla"></tbody>

</table>

<script>

    async function cargarQuizs(){

        const respuesta = await fetch("/quizs/listar");
        const quizs = await respuesta.json();

        let select = document.getElementById("quiz");
        select.innerHTML = "";

        quizs.forEach(quiz => {
            select.innerHTML += `
                <option value="${quiz.id}">
                    ${quiz.titulo}
                </option>
            `;
        });

        if(quizs.length > 0){
            cargarRanking();
        }
    }

    async function cargarRanking(){

        const quizId = document.getElementById("quiz").value;

        if(!quizId){
            return;
        }

        const respuesta = await fetch("/resultados/quiz/" + quizId);
        const resultados = await respuesta.json();

        let tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        resultados.forEach((resultado,index)=>{

            tabla.innerHTML += `
                <tr>
                    <td>${index+1}</td>
                    <td>${resultado.nombre}</td>
                    <td>${resultado.puntaje}</td>
                </tr>
            `;

        });

    }

    cargarQuizs();

</script>

</body>
</html>
