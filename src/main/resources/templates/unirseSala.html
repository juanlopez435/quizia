<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Unirse a Sala</title>

    <style>

        body{
            background:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
            margin-top:50px;
        }

        input{
            width:300px;
            padding:10px;
            margin:10px;
        }

        button{
            width:200px;
            padding:10px;
        }

    </style>

</head>

<body>

<h1>Unirse a una Sala</h1>

<input
        type="text"
        id="nombre"
        placeholder="Tu nombre">

<br>

<input
        type="text"
        id="codigo"
        placeholder="Código de Sala">

<br><br>

<button onclick="entrarSala()">
    Entrar
</button>

<h2 id="resultado"></h2>

<script>

    async function entrarSala(){

        const nombre =
            document.getElementById("nombre").value;

        const codigo =
            document.getElementById("codigo").value;

        const respuesta =
            await fetch(
                "/salas/codigo/" + codigo
            );

        const sala =
            await respuesta.json();

        if(!sala){

            document.getElementById("resultado")
                .innerHTML =
                "❌ Sala no encontrada";

            return;
        }

        const participante = {

            nombre: nombre,

            sala: {
                id: sala.id
            }
        };

        await fetch("/participantes/guardar",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(participante)
        });

        document.getElementById("resultado")
            .innerHTML =
            "✅ Bienvenido " +
            nombre +
            " a la sala " +
            sala.codigo;
    }

</script>

</body>

</html>
