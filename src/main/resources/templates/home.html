<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>QuizIA Dashboard</title>

    <style>

        body{
            background:#121212;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        .container{
            width:800px;
            margin:auto;
            margin-top:40px;
        }

        .box{
            background:#1f1f1f;
            padding:20px;
            margin:20px;
            border-radius:15px;
        }

        input, select{
            width:300px;
            padding:10px;
            margin:10px;
        }

        button{
            padding:12px;
            width:200px;
            background:#0984e3;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🎯 QUIZIA DASHBOARD</h1>

    <!-- QUIZ -->
    <div class="box">
        <h2>Crear Quiz</h2>
        <input id="tituloQuiz" placeholder="Título del Quiz">
        <br>
        <button onclick="crearQuiz()">Crear</button>
    </div>

    <!-- PREGUNTA -->
    <div class="box">
        <h2>Crear Pregunta</h2>

        <select id="quizSelect"></select>

        <br>

        <input id="pregunta" placeholder="Pregunta">
        <input id="a" placeholder="A">
        <input id="b" placeholder="B">
        <input id="c" placeholder="C">
        <input id="d" placeholder="D">
        <input id="correcta" placeholder="Correcta (A/B/C/D)">

        <br>

        <button onclick="crearPregunta()">Guardar</button>
    </div>

    <!-- SALA -->
    <div class="box">
        <h2>Crear Sala</h2>

        <select id="quizSala"></select>

        <br>

        <button onclick="crearSala()">Crear Sala</button>
    </div>

</div>

<script>

    let quizs = [];

    async function cargarQuizs(){

        const res = await fetch("/quizs/listar");
        quizs = await res.json();

        let select1 = document.getElementById("quizSelect");
        let select2 = document.getElementById("quizSala");

        select1.innerHTML = "";
        select2.innerHTML = "";

        quizs.forEach(q => {

            select1.innerHTML += `<option value="${q.id}">${q.titulo}</option>`;
            select2.innerHTML += `<option value="${q.id}">${q.titulo}</option>`;
        });
    }

    async function crearQuiz(){

        const titulo = document.getElementById("tituloQuiz").value;

        await fetch("/quizs/guardar",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({titulo})
        });

        alert("Quiz creado");
        cargarQuizs();
    }

    async function crearPregunta(){

        const pregunta = {
            pregunta: document.getElementById("pregunta").value,
            opcionA: document.getElementById("a").value,
            opcionB: document.getElementById("b").value,
            opcionC: document.getElementById("c").value,
            opcionD: document.getElementById("d").value,
            correcta: document.getElementById("correcta").value,
            quiz:{ id: document.getElementById("quizSelect").value }
        };

        await fetch("/preguntas/guardar",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(pregunta)
        });

        alert("Pregunta creada");
    }

    async function crearSala(){

        const quizId = document.getElementById("quizSala").value;

        const res = await fetch("/salas/guardar",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                quiz: { id: quizId }
            })
        });

        const sala = await res.json();

        console.log("SALA:", sala);

        if(!sala || !sala.id){
            alert("Error creando sala");
            return;
        }

        window.location.href = "/sala?id=" + sala.id;
    }

    cargarQuizs();

</script>

</body>
</html>
